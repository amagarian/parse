<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Parse – Claim Your Items</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0B0907;
      --bg-card:   #161210;
      --accent:    #C9B99A;
      --accent2:   #A6947A;
      --text:      #EDE3D4;
      --muted:     #6E5E4A;
      --rule:      rgba(201,185,154,0.13);
      --obsidian:  #0B0907;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 0 0 120px;
    }

    /* ── Nav ── */
    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 22px 14px;
      border-bottom: 1px solid var(--rule);
    }
    .mark { width: 22px; height: 22px; position: relative; }
    .mark svg { width: 100%; height: 100%; }
    .wordmark {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--text);
      font-weight: 300;
    }
    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin-left: auto;
      transition: background 0.4s;
    }
    .sync-dot.live { background: #4CAF50; }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Name entry ── */
    .name-wrap { padding: 40px 22px 0; }
    .intro {
      font-size: 22px;
      font-weight: 400;
      font-style: italic;
      font-family: 'Lora', Georgia, serif;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 32px;
    }
    .field-label {
      font-size: 8px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--accent2);
      color: var(--text);
      font-size: 18px;
      font-weight: 300;
      padding: 8px 0 10px;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="text"]::placeholder { color: var(--muted); }

    /* ── Buttons ── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: var(--obsidian);
      border: none;
      border-radius: 12px;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-family: 'DM Mono', 'Courier New', monospace;
      cursor: pointer;
      margin-top: 32px;
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .btn-venmo {
      display: block;
      width: calc(100% - 44px);
      margin: 0 22px;
      padding: 16px;
      background: #EDE3D4;
      color: var(--obsidian);
      border: none;
      border-radius: 12px;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-family: 'DM Mono', 'Courier New', monospace;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }
    .btn-ghost {
      display: block;
      width: calc(100% - 44px);
      margin: 12px 22px 0;
      padding: 14px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--rule);
      border-radius: 10px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'DM Mono', 'Courier New', monospace;
      cursor: pointer;
      text-align: center;
    }

    /* ── Claim screen ── */
    .section-label {
      font-size: 8px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 20px 22px 10px;
    }
    .restaurant-name {
      font-size: 20px;
      font-weight: 400;
      font-style: italic;
      font-family: 'Lora', Georgia, serif;
      color: var(--text);
      padding: 16px 22px 4px;
    }
    .bill-meta {
      font-size: 11px;
      color: var(--muted);
      padding: 0 22px 20px;
      letter-spacing: 0.3px;
    }

    /* ── Item rows ── */
    .item-row {
      display: flex;
      align-items: center;
      padding: 14px 22px;
      border-bottom: 1px solid var(--rule);
      gap: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .item-row:first-child { border-top: 1px solid var(--rule); }
    .check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .check-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--obsidian);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .item-row.selected .check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .item-row.selected .check-dot { opacity: 1; }

    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 14px;
      font-weight: 300;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-claimed {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }
    .item-price {
      font-size: 13px;
      font-family: 'DM Mono', 'Courier New', monospace;
      color: var(--accent2);
      flex-shrink: 0;
    }

    /* ── Total bar ── */
    .total-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border-top: 1px solid var(--rule);
      padding: 14px 22px 32px;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .total-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .total-amount {
      font-size: 22px;
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      color: var(--text);
    }

    /* ── Summary screen ── */
    .summary-wrap { padding: 32px 22px 0; }
    .summary-total {
      font-size: 52px;
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      color: var(--text);
      margin-bottom: 4px;
    }
    .summary-sublabel {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--rule);
    }
    .breakdown-label {
      font-size: 12px;
      font-weight: 300;
      color: var(--text);
    }
    .breakdown-value {
      font-size: 12px;
      font-family: 'DM Mono', 'Courier New', monospace;
      color: var(--accent2);
    }
    .breakdown-total-row {
      display: flex;
      justify-content: space-between;
      padding: 16px 0;
    }
    .breakdown-total-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .breakdown-total-value {
      font-size: 14px;
      font-family: 'DM Mono', 'Courier New', monospace;
      color: var(--accent);
    }
    .venmo-wrap { padding: 32px 0 0; }

    /* ── Error ── */
    .error-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 40px 22px;
      text-align: center;
      gap: 12px;
    }
    .error-title { font-size: 18px; font-weight: 300; color: var(--text); }
    .error-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }

    /* ── Split picker overlay ── */
    .split-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .split-overlay.active { display: flex; }
    .split-sheet {
      background: var(--bg-card);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 500px;
      padding: 28px 22px 40px;
    }
    .split-sheet-title {
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 6px;
    }
    .split-sheet-name {
      font-size: 16px;
      font-weight: 300;
      font-family: 'Lora', Georgia, serif;
      color: var(--text);
      text-align: center;
      margin-bottom: 20px;
    }
    .split-sheet-prompt {
      font-size: 11px;
      color: var(--accent2);
      text-align: center;
      margin-bottom: 16px;
    }
    .split-options {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .split-opt {
      flex: 1;
      padding: 14px;
      border: 1px solid var(--rule);
      border-radius: 10px;
      background: transparent;
      color: var(--accent);
      font-size: 12px;
      font-family: 'DM Mono', 'Courier New', monospace;
      cursor: pointer;
      text-align: center;
    }
    .split-opt.active {
      background: #EDE3D4;
      color: var(--obsidian);
      border-color: transparent;
    }
    .split-default {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--rule);
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'DM Mono', 'Courier New', monospace;
      cursor: pointer;
      text-align: center;
    }
    .item-split-badge {
      font-size: 10px;
      color: var(--accent2);
      margin-top: 2px;
    }
    .partial-tag {
      display: inline-block;
      font-size: 7px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent2);
      border: 0.5px solid rgba(166,148,122,0.4);
      border-radius: 4px;
      padding: 2px 5px;
      margin-left: 6px;
      vertical-align: middle;
      font-family: 'DM Mono', 'Courier New', monospace;
    }
    .hint-text {
      font-size: 8px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-align: center;
      padding: 16px 22px 0;
    }
    .split-custom-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex: 1;
      padding: 14px;
      border: 1px solid var(--rule);
      border-radius: 10px;
    }
    .split-custom-row span {
      font-size: 12px;
      font-family: 'DM Mono', 'Courier New', monospace;
      color: var(--accent);
    }
    .split-custom-input {
      width: 28px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--accent2);
      color: var(--text);
      font-size: 12px;
      font-family: 'DM Mono', 'Courier New', monospace;
      text-align: center;
      outline: none;
      -webkit-appearance: none;
      padding: 0;
    }
    .split-apply {
      width: 100%;
      padding: 14px;
      background: #EDE3D4;
      color: var(--obsidian);
      border: none;
      border-radius: 10px;
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-family: 'DM Mono', 'Courier New', monospace;
      cursor: pointer;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

<div class="nav">
  <div class="mark">
    <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M28 5 A23 23 0 0 0 28 51" stroke="#C9B99A" stroke-width="2.8" stroke-linecap="round" opacity="0.9"/>
      <path d="M28 5 A23 23 0 0 1 28 51" stroke="#A6947A" stroke-width="2.8" stroke-linecap="round" opacity="0.5"/>
    </svg>
  </div>
  <span class="wordmark">Parse</span>
  <div class="sync-dot" id="sync-dot" title="Sync status"></div>
</div>

<!-- Screen 1: Name Entry -->
<div class="screen active" id="screen-name">
  <div class="name-wrap">
    <p class="intro">Who are you<br>claiming for?</p>
    <p class="field-label">Your name</p>
    <input type="text" id="name-input" placeholder="e.g. Alex" autocomplete="off" autocorrect="off">
    <button class="btn-primary" id="btn-start">See the Items →</button>
  </div>
</div>

<!-- Screen 2: Claim Items -->
<div class="screen" id="screen-claim">
  <div id="restaurant-name" class="restaurant-name"></div>
  <div id="bill-meta" class="bill-meta"></div>
  <div class="section-label">Tap to claim your items</div>
  <div id="items-list"></div>
  <div style="height: 120px;"></div>

  <div class="total-bar">
    <div class="total-row">
      <span class="total-label">Your share</span>
      <span class="total-amount" id="running-total">$0.00</span>
    </div>
    <button class="btn-primary" id="btn-confirm" style="margin-top:0">Confirm My Items →</button>
  </div>
</div>

<!-- Screen 3: Summary -->
<div class="screen" id="screen-summary">
  <div class="summary-wrap">
    <div class="summary-total" id="summary-total"></div>
    <div class="summary-sublabel">Your total</div>
    <div id="breakdown-list"></div>
  </div>
  <div class="venmo-wrap">
    <a id="venmo-btn" class="btn-venmo" href="#">Pay via Venmo</a>
    <button class="btn-ghost" id="btn-back">← Edit Selection</button>
  </div>
</div>

<!-- Error -->
<div class="screen" id="screen-error">
  <div class="error-wrap">
    <div class="error-title">Link expired or invalid</div>
    <div class="error-sub">Ask the bill organiser to share a fresh QR code.</div>
  </div>
</div>

<!-- Split picker overlay -->
<div class="split-overlay" id="split-overlay">
  <div class="split-sheet">
    <div class="split-sheet-title">Split this item</div>
    <div class="split-sheet-name" id="split-item-name"></div>
    <div class="split-sheet-prompt">How many people are sharing?</div>
    <div class="split-options" id="split-options"></div>
    <button class="split-apply" id="split-apply-btn"></button>
    <button class="split-default" id="split-default-btn">Even split (default)</button>
  </div>
</div>

<!-- Firebase SDK (modular) -->
<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js';
import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion }
  from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js';

// ─── Firebase Config ─────────────────────────────────────────────────────────
// Fill this in with your project's config from:
// Firebase console → Project settings → Your apps → Web app → SDK setup
const firebaseConfig = {
  apiKey:            "AIzaSyBE4Usdcqn0mbFXnfee7atofFLsQy0BkWM",
  authDomain:        "parse-773ee.firebaseapp.com",
  projectId:         "parse-773ee",
  storageBucket:     "parse-773ee.firebasestorage.app",
  messagingSenderId: "1074078518058",
  appId:             "1:1074078518058:web:a2675045d3e851875d6c53"
};
// ─────────────────────────────────────────────────────────────────────────────

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);

// ── URL params ───────────────────────────────────────────────────────────────
const params    = new URLSearchParams(window.location.search);
const sessionId = params.get('id');
const rawData   = params.get('d');

// ── State ────────────────────────────────────────────────────────────────────
let session   = null;
let userName  = '';
let selected  = new Set();
let splitOverrides = {};  // idx -> denominator

// ── Helpers ──────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setSyncLive(live) {
  document.getElementById('sync-dot').classList.toggle('live', live);
}

// ── Decode compact p2 string ─────────────────────────────────────────────────
function b64UrlDecode(str) {
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  while (str.length % 4) str += '=';
  try { return atob(str); } catch(e) { return null; }
}

function parseSplitOverridesStr(raw) {
  if (!raw) return {};
  const result = {};
  raw.split(',').forEach(pair => {
    const [k, v] = pair.split(':');
    if (k && v) result[k] = parseInt(v) || 0;
  });
  return result;
}

function parseCompact(raw) {
  const text = b64UrlDecode(raw);
  if (!text) return null;
  const isP4 = text.startsWith('p4');
  const isP3 = text.startsWith('p3');
  const isP2 = text.startsWith('p2');
  if (!isP4 && !isP3 && !isP2) return null;

  const lines = text.split('\n');
  const hasFees = isP4 || isP3;
  const minLines = hasFees ? 8 : 7;
  if (lines.length < minLines) return null;

  const fees = hasFees ? (parseFloat(lines[7]) || 0) : 0;
  const itemStart = hasFees ? 8 : 7;

  const s = {
    restaurantName: lines[1],
    hostName:       lines[2],
    venmoUsername:  lines[3],
    subtotal:       parseFloat(lines[4]) || 0,
    tax:            parseFloat(lines[5]) || 0,
    tip:            parseFloat(lines[6]) || 0,
    fees,
    items: []
  };
  s.taxRate  = s.subtotal > 0 ? s.tax  / s.subtotal : 0;
  s.feesRate = s.subtotal > 0 ? s.fees / s.subtotal : 0;
  s.tipRate  = s.subtotal > 0 ? s.tip  / s.subtotal : 0;

  for (let i = itemStart; i < lines.length; i++) {
    const parts = lines[i].split('\t');
    if (parts.length < 3) continue;
    const claimedBy = parts[3] ? parts[3].split(',').filter(Boolean) : [];
    const itemId = parts[4] || `item-${i - itemStart}`;
    const splits = parts[5] ? parseSplitOverridesStr(parts[5]) : {};
    s.items.push({ id: itemId, name: parts[0],
                   price: parseFloat(parts[1]) || 0,
                   quantity: parseInt(parts[2]) || 1,
                   claimedBy, splitOverrides: splits });
  }
  return s;
}

function firestoreToSession(data) {
  const subtotal = data.subtotal || 0;
  const tax      = data.tax  || 0;
  const fees     = data.fees || 0;
  const tip      = data.tip  || 0;
  return {
    restaurantName: data.restaurantName || '',
    hostName:       data.hostName || '',
    venmoUsername:  data.venmoUsername || '',
    subtotal, tax, fees, tip,
    taxRate:  subtotal > 0 ? tax  / subtotal : 0,
    feesRate: subtotal > 0 ? fees / subtotal : 0,
    tipRate:  subtotal > 0 ? tip  / subtotal : 0,
    items: (data.items || []).map((item, idx) => ({
      id:        item.id || `item-${idx}`,
      name:      item.name || '',
      price:     item.price || 0,
      quantity:  item.quantity || 1,
      claimedBy: item.claimedBy || [],
      splitOverrides: item.splitOverrides || {}
    }))
  };
}

// ── Firestore ─────────────────────────────────────────────────────────────────
function startListener() {
  if (!sessionId) return;
  const docRef = doc(db, 'sessions', sessionId);
  onSnapshot(docRef, snap => {
    if (!snap.exists()) return;
    session = firestoreToSession(snap.data());
    setSyncLive(true);
    if (document.getElementById('screen-claim').classList.contains('active')) {
      renderClaim();
    }
  }, _err => setSyncLive(false));
}

async function writeClaims() {
  if (!sessionId || !session) return;
  const updatedItems = session.items.map((item, idx) => {
    const claimed = [...item.claimedBy];
    if (selected.has(idx) && !claimed.includes(userName)) claimed.push(userName);
    if (!selected.has(idx)) {
      const i = claimed.indexOf(userName);
      if (i !== -1) claimed.splice(i, 1);
    }
    const splits = { ...(item.splitOverrides || {}) };
    if (selected.has(idx) && splitOverrides[idx]) {
      splits[userName] = splitOverrides[idx];
    } else {
      delete splits[userName];
    }
    const result = { id: item.id, name: item.name, price: item.price,
             quantity: item.quantity, claimedBy: claimed };
    if (Object.keys(splits).length > 0) result.splitOverrides = splits;
    return result;
  });
  await updateDoc(doc(db, 'sessions', sessionId), { items: updatedItems });
  session.items = session.items.map((item, idx) => ({
    ...item,
    claimedBy: updatedItems[idx].claimedBy,
    splitOverrides: updatedItems[idx].splitOverrides || {}
  }));
}

// ── Navigation ────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── Claim screen ──────────────────────────────────────────────────────────────
function startClaiming() {
  const input = document.getElementById('name-input');
  userName = input.value.trim();
  if (!userName) { input.focus(); return; }
  renderClaim();
  showScreen('screen-claim');
  // Tell the host this person joined
  if (sessionId) {
    updateDoc(doc(db, 'sessions', sessionId), {
      participants: arrayUnion(userName)
    }).catch(console.warn);
  }
}

function renderClaim() {
  document.getElementById('restaurant-name').textContent =
    session.restaurantName || 'Your Bill';
  document.getElementById('bill-meta').textContent =
    `$${(session.subtotal + session.tax + session.tip).toFixed(2)} total · organised by ${session.hostName}`;

  const list = document.getElementById('items-list');
  list.innerHTML = '';
  session.items.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'item-row' + (selected.has(idx) ? ' selected' : '');

    let pressTimer = null;
    row.addEventListener('pointerdown', () => {
      pressTimer = setTimeout(() => { pressTimer = null; openSplitPicker(idx); }, 500);
    });
    row.addEventListener('pointerup', () => {
      if (pressTimer !== null) { clearTimeout(pressTimer); toggleItem(idx, row); }
    });
    row.addEventListener('pointerleave', () => {
      if (pressTimer !== null) clearTimeout(pressTimer);
    });

    const others = item.claimedBy.filter(n => n !== userName);
    const claimedText = others.length ? `Also claimed by ${others.join(', ')}` : '';
    const mySplit = splitOverrides[idx];
    const hasAnySplit = mySplit || Object.keys(item.splitOverrides || {}).length > 0;
    const partialTag = hasAnySplit ? '<span class="partial-tag">partial</span>' : '';
    const splitBadge = (selected.has(idx) && mySplit)
      ? `<div class="item-split-badge">Your share: 1/${mySplit}</div>` : '';

    row.innerHTML = `
      <div class="check"><div class="check-dot"></div></div>
      <div class="item-info">
        <div class="item-name">${escHtml(item.name)}${partialTag}</div>
        ${claimedText ? `<div class="item-claimed">${escHtml(claimedText)}</div>` : ''}
        ${splitBadge}
      </div>
      <div class="item-price">$${item.price.toFixed(2)}</div>`;
    list.appendChild(row);
  });

  let hint = document.getElementById('claim-hint');
  if (!hint) {
    hint = document.createElement('div');
    hint.id = 'claim-hint';
    hint.className = 'hint-text';
    hint.textContent = 'Tap & hold an item to split it';
    list.parentNode.insertBefore(hint, list.nextSibling);
  }
  updateTotal();
}

function toggleItem(idx, row) {
  if (selected.has(idx)) {
    selected.delete(idx);
    delete splitOverrides[idx];
    row.classList.remove('selected');
  } else {
    selected.add(idx);
    row.classList.add('selected');
  }
  updateTotal();
  writeClaims().catch(console.warn);
}

function priceForPerson(item, idx) {
  if (splitOverrides[idx]) return item.price / splitOverrides[idx];
  const override = (item.splitOverrides || {})[userName];
  if (override) return item.price / override;
  const sharers = Math.max(1, item.claimedBy.length +
    (item.claimedBy.includes(userName) ? 0 : 1));
  return item.price / sharers;
}

function mySubtotal() {
  let sum = 0;
  selected.forEach(idx => { sum += priceForPerson(session.items[idx], idx); });
  return sum;
}

function updateTotal() {
  const sub = mySubtotal();
  const total = sub + sub * session.taxRate + sub * session.feesRate + sub * session.tipRate;
  document.getElementById('running-total').textContent = `$${total.toFixed(2)}`;
}

// ── Summary screen ────────────────────────────────────────────────────────────
async function showSummary() {
  const btn = document.getElementById('btn-confirm');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  await writeClaims().catch(console.warn);

  const sub   = mySubtotal();
  const tax   = sub * session.taxRate;
  const fees  = sub * session.feesRate;
  const tip   = sub * session.tipRate;
  const total = sub + tax + fees + tip;

  document.getElementById('summary-total').textContent = `$${total.toFixed(2)}`;

  const list = document.getElementById('breakdown-list');
  list.innerHTML = '';

  selected.forEach(idx => {
    const item = session.items[idx];
    const share = priceForPerson(item, idx);
    const splitN = splitOverrides[idx] || (item.splitOverrides || {})[userName];
    const splitLabel = splitN ? ` (1/${splitN})` : '';
    list.innerHTML += `
      <div class="breakdown-row">
        <span class="breakdown-label">${escHtml(item.name)}${splitLabel}</span>
        <span class="breakdown-value">$${share.toFixed(2)}</span>
      </div>`;
  });

  list.innerHTML += `
    <div class="breakdown-row">
      <span class="breakdown-label">Tax</span>
      <span class="breakdown-value">$${tax.toFixed(2)}</span>
    </div>` +
    (fees > 0 ? `
    <div class="breakdown-row">
      <span class="breakdown-label">Fees &amp; Surcharges</span>
      <span class="breakdown-value">$${fees.toFixed(2)}</span>
    </div>` : '') + `
    <div class="breakdown-row">
      <span class="breakdown-label">Tip</span>
      <span class="breakdown-value">$${tip.toFixed(2)}</span>
    </div>
    <div class="breakdown-total-row">
      <span class="breakdown-total-label">Total</span>
      <span class="breakdown-total-value">$${total.toFixed(2)}</span>
    </div>`;

  const place = session.restaurantName || 'dinner';
  const note  = `Split at ${place} via Parse`;
  const venmoURL = session.venmoUsername
    ? `https://venmo.com/${encodeURIComponent(session.venmoUsername)}?txn=pay&amount=${total.toFixed(2)}&note=${note.replace(/ /g, '%20')}`
    : 'https://venmo.com/';
  document.getElementById('venmo-btn').href = venmoURL;

  btn.disabled = false;
  btn.textContent = 'Confirm My Items →';
  showScreen('screen-summary');
}

// ── Split picker ──────────────────────────────────────────────────────────────
let splitPickerIdx = null;

function openSplitPicker(idx) {
  if (navigator.vibrate) navigator.vibrate(15);
  splitPickerIdx = idx;
  if (!selected.has(idx)) selected.add(idx);
  const item = session.items[idx];
  document.getElementById('split-item-name').textContent = item.name;

  const optionsDiv = document.getElementById('split-options');
  optionsDiv.innerHTML = '';
  [2, 3, 4].forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'split-opt' + (splitOverrides[idx] === n ? ' active' : '');
    btn.textContent = `1/${n}`;
    btn.addEventListener('click', () => {
      splitOverrides[idx] = n;
      closeSplitPicker();
      renderClaim();
      writeClaims().catch(console.warn);
    });
    optionsDiv.appendChild(btn);
  });

  const customDiv = document.createElement('div');
  customDiv.className = 'split-custom-row';
  customDiv.innerHTML = '<span>1/</span><input type="number" class="split-custom-input" id="split-custom-input" min="2" placeholder="?">';
  optionsDiv.appendChild(customDiv);

  const applyBtn = document.getElementById('split-apply-btn');
  applyBtn.style.display = 'none';
  applyBtn.textContent = '';

  const customInput = customDiv.querySelector('input');
  customInput.addEventListener('input', () => {
    const val = parseInt(customInput.value);
    if (val >= 2) {
      applyBtn.textContent = `Split 1/${val}`;
      applyBtn.style.display = 'block';
    } else {
      applyBtn.style.display = 'none';
    }
  });

  document.getElementById('split-overlay').classList.add('active');
}

document.getElementById('split-apply-btn').addEventListener('click', () => {
  const input = document.getElementById('split-custom-input');
  const val = parseInt(input?.value);
  if (val >= 2 && splitPickerIdx !== null) {
    splitOverrides[splitPickerIdx] = val;
    closeSplitPicker();
    renderClaim();
    writeClaims().catch(console.warn);
  }
});

function closeSplitPicker() {
  document.getElementById('split-overlay').classList.remove('active');
  splitPickerIdx = null;
}

document.getElementById('split-default-btn').addEventListener('click', () => {
  if (splitPickerIdx !== null) delete splitOverrides[splitPickerIdx];
  closeSplitPicker();
  renderClaim();
  writeClaims().catch(console.warn);
});

document.getElementById('split-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSplitPicker();
});

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  if (!rawData) { showScreen('screen-error'); return; }
  session = parseCompact(rawData);
  if (!session) { showScreen('screen-error'); return; }
  startListener(); // overlay Firestore live data on top of local compact data
}

// ── Event wiring ──────────────────────────────────────────────────────────────
document.getElementById('btn-start')  .addEventListener('click', startClaiming);
document.getElementById('btn-confirm').addEventListener('click', showSummary);
document.getElementById('btn-back')   .addEventListener('click', () => showScreen('screen-claim'));
document.getElementById('name-input') .addEventListener('keydown', e => {
  if (e.key === 'Enter') startClaiming();
});

init();
</script>
</body>
</html>
