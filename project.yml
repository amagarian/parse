name: Parse
options:
  bundleIdPrefix: com.amagarian
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  Parse:
    type: application
    platform: iOS
    sources:
      - Parse
    dependencies:
      - target: ParseClip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amagarian.parse
        DEVELOPMENT_TEAM: "NF6D29P3HJ"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    info:
      path: Parse/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Parse
        CFBundleIconName: AppIcon
        NSCameraUsageDescription: "Parse needs camera access to scan receipts and QR codes."
        NSPhotoLibraryUsageDescription: "Parse needs photo library access to select receipt photos."
        LSApplicationQueriesSchemes:
          - venmo
    entitlements:
      path: Parse/Parse.entitlements
      properties:
        com.apple.developer.associated-domains:
          - "appclips:amagarian.github.io"

  ParseClip:
    type: application.on-demand-install-capable
    platform: iOS
    sources:
      - path: ParseClip
      - path: Parse/Models
      - path: Parse/Services/QRCodeService.swift
      - path: Parse/Extensions
      - path: Parse/Views/ParseMark.swift
      - path: Parse/Views/ItemSelectionView.swift
      - path: Parse/Views/PaymentSummaryView.swift
      - path: Parse/Views/SummaryRow.swift
      - path: Parse/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amagarian.parse.Clip
        DEVELOPMENT_TEAM: "NF6D29P3HJ"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    info:
      path: ParseClip/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Parse
        CFBundleIconName: AppIcon
        CFBundlePackageType: APPL
        NSCameraUsageDescription: "Parse needs camera access to scan QR codes."
    entitlements:
      path: ParseClip/ParseClip.entitlements
      properties:
        com.apple.developer.associated-domains:
          - "appclips:amagarian.github.io"
        com.apple.developer.parent-application-identifiers:
          - "$(AppIdentifierPrefix)com.amagarian.parse"
